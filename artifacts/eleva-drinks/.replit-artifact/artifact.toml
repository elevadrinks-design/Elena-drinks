kind = "web"
previewPath = "/"
title = "Eleva Drinks"
version = "1.0.0"
id = "artifacts/eleva-drinks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23549

[services.development]
run = "npx -y http-server . -p $PORT -a 0.0.0.0 -c-1 --silent"

[services.production]
publicDir = "artifacts/eleva-drinks"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23549"
